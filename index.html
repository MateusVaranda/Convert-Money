<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <title>Convert Money</title>
</head>

<body>
    <img class="img-logo" src="./assets/logo.gif" alt="Logo do Convert Money" class="logo">

    <main>

        <label>
            Convert <b>De</b>
            <select>
                <option>R$ Real Brasileiro</option>
            </select>
        </label>

        <label>
            Convert <b>Para</b>
            <select>
                <option>US$ Dólar Americano</option>
                <option>E€ Euro</option>
            </select>
        </label>

        <label>
            Valor
            <input placeholder="Digite o valor:">
        </label>

        <button>Converter</button>

        <section>
            <div class="currency-box">
                <img src="./assets/brasil.png" alt="logo-brasil">
                <p class="currency">Real</p>
                <p class="currency-value">R$ 0,00</p>
            </div>

            <img class="arrow-img" src="./assets/arrow.png" alt="seta-conversao">

            <div class="currency-box">
                <img src="./assets/estados-unidos.png" alt="logo-estados-unidos">
                <p class="currency">Dólar</p>
                <p class="currency-value">US$ 0,00</p>
            </div>
        </section>

    </main>
</body>

</html>
